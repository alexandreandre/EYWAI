# Fichier: frontend/nginx.template.conf
server {
  listen ${PORT};
  server_name _;

  location / {
    root   /usr/share/nginx/html;
    index  index.html;
    try_files $uri $uri/ /index.html;

    # Headers pour CORS et sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
  }

  # Assets hashés (Vite) : cache long. Ne pas inclure .ico ici : le favicon change souvent
  # et « immutable » + 1 an empêche le navigateur de récupérer la nouvelle icône après déploiement.
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /favicon.ico {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
  }

}
