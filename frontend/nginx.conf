# Fichier: frontend/nginx.conf

server {
  listen 80;
  server_name localhost;

  # Sers les fichiers de l'application React
  location / {
    root   /usr/share/nginx/html;
    index  index.html;
    # Indispensable pour React Router
    try_files $uri $uri/ /index.html;
  }

  # --- LA CONNEXION ---
  # Intercepte toutes les requêtes /api/
  location /api/ {
    # "backend" est le nom du service backend que nous allons
    # définir dans docker-compose.yml
    proxy_pass http://backend:8000; 
    
    # En-têtes nécessaires pour que le proxy fonctionne
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}