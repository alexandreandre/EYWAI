# PR + push sur main : vérifs auto (secrets, backend, frontend, export OpenAPI).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend (tests + OpenAPI)
    runs-on: ubuntu-latest
    # L’app crée le client Supabase à l’import ; des valeurs factices suffisent pour pytest / OpenAPI en CI.
    env:
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_KEY: ci-placeholder-service-role-key
      # Client OpenAI instancié à l’import (collective_agreements) ; clé factice si les tests mockent les appels.
      OPENAI_API_KEY: sk-ci-placeholder-not-used-when-mocked
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Paquets système (PDF / OCR, comme le Dockerfile)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libffi-dev fontconfig libcairo2 \
            libpango-1.0-0 libpangocairo-1.0-0 libgobject-2.0-0 \
            poppler-utils tesseract-ocr tesseract-ocr-fra

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install ruff pip-audit

      - name: Ruff (info seulement)
        continue-on-error: true
        run: ruff check . --output-format github

      - name: pip-audit (info seulement)
        continue-on-error: true
        # CVE-2026-4539 (pygments) : pas de version corrigée listée par pip-audit au 2026-03 ; ignorer jusqu’au correctif amont.
        run: pip-audit -r requirements.txt --desc on --ignore-vuln CVE-2026-4539

      - name: Pytest (hors e2e)
        run: python -m pytest tests/ -m "not e2e" -v --tb=short

      - name: Fichier OpenAPI
        run: |
          python - <<'PY'
          import json
          from app.main import app
          with open("openapi.json", "w", encoding="utf-8") as f:
              json.dump(app.openapi(), f, indent=2, ensure_ascii=False)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: backend/openapi.json
          retention-days: 14

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_URL: https://example.com

      - name: npm audit (info seulement)
        continue-on-error: true
        run: npm audit --audit-level=moderate
