# PR + push sur main : vérifs auto (secrets, backend, frontend, export OpenAPI).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend (tests + OpenAPI)
    runs-on: ubuntu-latest
    # Même projet Supabase que le déploiement : les tests d’intégration et la paie appellent l’API réelle.
    # Ne pas utiliser d’URL inventée (ex. ci-placeholder.supabase.co) : DNS « Name or service not known ».
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Paquets système (PDF / OCR, comme le Dockerfile)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libffi-dev fontconfig libcairo2 \
            libpango-1.0-0 libpangocairo-1.0-0 libgobject-2.0-0 \
            poppler-utils tesseract-ocr tesseract-ocr-fra

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pip-audit

      - name: OpenAI optionnel (évite erreur d’import si secret absent)
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY=sk-ci-minimal-placeholder" >> "$GITHUB_ENV"
          fi

      - name: Secrets Supabase requis pour pytest (projet réel)
        run: |
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_KEY:-}" ]; then
            echo "::error::Définis au minimum SUPABASE_URL et SUPABASE_KEY (Settings → Secrets and variables → Actions), comme pour le deploy. Ajoute SUPABASE_SERVICE_KEY (clé service_role) pour les chemins admin / paie ; sinon l’app retombe sur SUPABASE_KEY."
            exit 1
          fi

      - name: Ruff (info seulement)
        continue-on-error: true
        run: ruff check . --output-format github

      - name: pip-audit (info seulement)
        continue-on-error: true
        # CVE-2026-4539 (pygments) : pas de version corrigée listée par pip-audit au 2026-03 ; ignorer jusqu’au correctif amont.
        run: pip-audit -r requirements.txt --desc on --ignore-vuln CVE-2026-4539

      - name: Pytest (hors e2e)
        run: python -m pytest tests/ -m "not e2e" -v --tb=short

      - name: Fichier OpenAPI
        run: |
          python - <<'PY'
          import json
          from app.main import app
          with open("openapi.json", "w", encoding="utf-8") as f:
              json.dump(app.openapi(), f, indent=2, ensure_ascii=False)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: backend/openapi.json
          retention-days: 14

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_URL: https://example.com

      - name: npm audit (info seulement)
        continue-on-error: true
        run: npm audit --audit-level=moderate
