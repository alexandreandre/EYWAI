# 1) Chaque PR → zip avec liste des fichiers + stats du diff (artifact).
# 2) À la main (Actions → Run workflow) → commentaire résumé sur une PR (Claude, secret ANTHROPIC_API_KEY).
name: Pull requests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Numéro de la PR (ex. 42)
        required: true
        type: string

jobs:
  artefact-contexte:
    if: github.event_name == 'pull_request'
    name: Zip contexte (diff + fichiers)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Préparer le dossier
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p pr-context
          echo "PR #${{ github.event.pull_request.number }} — ${{ github.head_ref }} → ${{ github.base_ref }}" > pr-context/summary.txt
          echo "" >> pr-context/summary.txt
          git diff --stat "${BASE}"..."${HEAD}" > pr-context/diff-stat.txt
          git diff --name-only "${BASE}"..."${HEAD}" > pr-context/files.txt
          {
            echo "## Résumé"
            cat pr-context/summary.txt
            echo ""
            echo "## git diff --stat"
            cat pr-context/diff-stat.txt
            echo ""
            echo "## Fichiers modifiés"
            cat pr-context/files.txt
          } > pr-context/README.txt
          cp pr-context/README.txt pr-context/full-context.txt

      - uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number }}-context
          path: pr-context/
          retention-days: 14

  commentaire-ia:
    if: github.event_name == 'workflow_dispatch'
    name: Commentaire Claude sur une PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier ANTHROPIC_API_KEY
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::error::Ajoute le secret ANTHROPIC_API_KEY (Settings → Secrets → Actions)."
            exit 1
          fi

      - name: Appeler Claude et publier le commentaire
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-3-5-haiku-20241022' }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, subprocess, sys, urllib.request

          pr = os.environ["PR_NUMBER"]
          diff = subprocess.check_output(
              ["gh", "pr", "diff", pr, "--repo", os.environ["GITHUB_REPOSITORY"]],
              text=True,
              stderr=subprocess.STDOUT,
          )
          max_len = 150_000
          if len(diff) > max_len:
              diff = diff[:max_len] + "\n\n[… diff tronqué …]"

          model = os.environ.get("CLAUDE_MODEL", "claude-3-5-haiku-20241022")
          prompt = (
              "Tu es un reviewer senior. Résume cette PR en français : "
              "objectif, risques, fichiers clés, points à vérifier. Markdown, listes courtes.\n\n"
              "```diff\n" + diff + "\n```"
          )
          body = {
              "model": model,
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}],
          }
          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(body).encode(),
              headers={
                  "content-type": "application/json",
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=120) as resp:
              data = json.load(resp)
          text = "".join(b.get("text", "") for b in data.get("content", []) if isinstance(b, dict))
          if not text.strip():
              print(data, file=sys.stderr)
              sys.exit("Réponse Claude vide")
          path = os.environ["GITHUB_WORKSPACE"] + "/claude-comment.md"
          with open(path, "w", encoding="utf-8") as f:
              f.write(text)
          PY
          gh pr comment "${{ inputs.pr_number }}" --body-file claude-comment.md
