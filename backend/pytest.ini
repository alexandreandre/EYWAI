[pytest]
# Racine du package `app` (modular monolith)
pythonpath = .
# Exécuter les tests async (async def) avec le plugin anyio
anyio_mode = auto
# Marqueurs personnalisés (complément à conftest.py)
markers =
    unit: tests unitaires (mocks, pas de DB/HTTP réels)
    integration: tests d’intégration (API, repository, wiring)
    e2e: smoke / end-to-end (désélection: pytest -m "not e2e")
    asyncio: test asynchrone (pytest-asyncio / anyio)
